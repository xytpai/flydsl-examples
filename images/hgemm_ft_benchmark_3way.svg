<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">HGEMM BF16 Benchmark (3-way)</title>
  <desc id="desc">Bar chart comparing HGEMM, Triton max-autotune, and Torch hipBLAS BF16 throughput in TFLOPS for six GEMM benchmark shapes.</desc>
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="64" y="46" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">HGEMM BF16 Benchmark (3-way)</text>
  <text x="64" y="76" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">TFLOPS computed from Self CUDA total / 100 profiled calls, warmup=500, niters=600</text>

  <rect x="870" y="112" width="270" height="148" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <rect x="892" y="138" width="18" height="18" fill="#22d3ee" stroke="#0891b2"/>
  <text x="920" y="152" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0891b2">HGEMM</text>
  <rect x="892" y="172" width="18" height="18" fill="#8b5cf6" stroke="#6d28d9"/>
  <text x="920" y="186" font-family="Arial, sans-serif" font-size="14" fill="#111827">Triton max-autotune</text>
  <rect x="892" y="206" width="18" height="18" fill="#f97316"/>
  <text x="920" y="220" font-family="Arial, sans-serif" font-size="14" fill="#111827">Torch hipBLAS</text>
  <text x="892" y="246" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">Higher TFLOPS is better</text>

  <line x1="150" y1="515" x2="830" y2="515" stroke="#111827" stroke-width="1.5"/>
  <line x1="150" y1="125" x2="150" y2="515" stroke="#111827" stroke-width="1.5"/>
  <text x="34" y="320" transform="rotate(-90 34 320)" font-family="Arial, sans-serif" font-size="14" fill="#374151">BF16 throughput (TFLOPS, higher is better)</text>

  <g font-family="Arial, sans-serif" font-size="12" fill="#6b7280">
    <line x1="150" y1="515" x2="830" y2="515" stroke="#e5e7eb"/>
    <text x="136" y="519" text-anchor="end">0</text>
    <line x1="150" y1="417.5" x2="830" y2="417.5" stroke="#e5e7eb"/>
    <text x="136" y="421.5" text-anchor="end">500</text>
    <line x1="150" y1="320" x2="830" y2="320" stroke="#e5e7eb"/>
    <text x="136" y="324" text-anchor="end">1000</text>
    <line x1="150" y1="222.5" x2="830" y2="222.5" stroke="#e5e7eb"/>
    <text x="136" y="226.5" text-anchor="end">1500</text>
    <line x1="150" y1="125" x2="830" y2="125" stroke="#e5e7eb"/>
    <text x="136" y="129" text-anchor="end">2000</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="165" y="467.71" width="20" height="47.29" rx="4" fill="#22d3ee" stroke="#0891b2" stroke-width="1"/>
    <rect x="191" y="482.32" width="20" height="32.68" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
    <rect x="217" y="467.38" width="20" height="47.62" rx="4" fill="#f97316"/>
    <text x="175" y="458" text-anchor="middle" font-size="11" font-weight="700" fill="#0891b2">242</text>
    <text x="201" y="473" text-anchor="middle" font-size="11" fill="#6d28d9">168</text>
    <text x="227" y="458" text-anchor="middle" font-size="11" fill="#111827">244</text>
    <text x="201" y="544" text-anchor="middle" font-size="12" fill="#111827">1024x1024x1024</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="273" y="372.75" width="20" height="142.25" rx="4" fill="#22d3ee" stroke="#0891b2" stroke-width="1"/>
    <rect x="299" y="373.35" width="20" height="141.65" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
    <rect x="325" y="383.57" width="20" height="131.43" rx="4" fill="#f97316"/>
    <text x="283" y="363" text-anchor="middle" font-size="11" font-weight="700" fill="#0891b2">730</text>
    <text x="309" y="364" text-anchor="middle" font-size="11" fill="#6d28d9">726</text>
    <text x="335" y="374" text-anchor="middle" font-size="11" fill="#111827">674</text>
    <text x="309" y="544" text-anchor="middle" font-size="12" fill="#111827">2048x2048x2048</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="381" y="257.05" width="20" height="257.95" rx="4" fill="#22d3ee" stroke="#0891b2" stroke-width="1"/>
    <rect x="407" y="256.68" width="20" height="258.32" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
    <rect x="433" y="217.35" width="20" height="297.65" rx="4" fill="#f97316"/>
    <text x="391" y="247" text-anchor="middle" font-size="11" font-weight="700" fill="#0891b2">1323</text>
    <text x="417" y="247" text-anchor="middle" font-size="11" fill="#6d28d9">1325</text>
    <text x="443" y="208" text-anchor="middle" font-size="11" fill="#111827">1526</text>
    <text x="417" y="544" text-anchor="middle" font-size="12" fill="#111827">4096x4096x4096</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="489" y="245.88" width="20" height="269.12" rx="4" fill="#22d3ee" stroke="#0891b2" stroke-width="1"/>
    <rect x="515" y="250.99" width="20" height="264.01" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
    <rect x="541" y="215.52" width="20" height="299.48" rx="4" fill="#f97316"/>
    <text x="499" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#0891b2">1380</text>
    <text x="525" y="241" text-anchor="middle" font-size="11" fill="#6d28d9">1354</text>
    <text x="551" y="206" text-anchor="middle" font-size="11" fill="#111827">1536</text>
    <text x="525" y="544" text-anchor="middle" font-size="12" fill="#111827">4096x4096x8192</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="597" y="248.22" width="20" height="266.78" rx="4" fill="#22d3ee" stroke="#0891b2" stroke-width="1"/>
    <rect x="623" y="265.34" width="20" height="249.66" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
    <rect x="649" y="198.50" width="20" height="316.50" rx="4" fill="#f97316"/>
    <text x="607" y="238" text-anchor="middle" font-size="11" font-weight="700" fill="#0891b2">1368</text>
    <text x="633" y="255" text-anchor="middle" font-size="11" fill="#6d28d9">1280</text>
    <text x="659" y="189" text-anchor="middle" font-size="11" fill="#111827">1623</text>
    <text x="633" y="544" text-anchor="middle" font-size="12" fill="#111827">8192x8192x8192</text>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="705" y="298.59" width="20" height="216.41" rx="4" fill="#22d3ee" stroke="#0891b2" stroke-width="1"/>
    <rect x="731" y="298.30" width="20" height="216.70" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
    <rect x="757" y="214.23" width="20" height="300.77" rx="4" fill="#f97316"/>
    <text x="715" y="289" text-anchor="middle" font-size="11" font-weight="700" fill="#0891b2">1110</text>
    <text x="741" y="288" text-anchor="middle" font-size="11" fill="#6d28d9">1111</text>
    <text x="767" y="205" text-anchor="middle" font-size="11" fill="#111827">1542</text>
    <text x="741" y="544" text-anchor="middle" font-size="12" fill="#111827">16384x16384x16384</text>
  </g>

  <text x="870" y="316" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Summary</text>
  <text x="870" y="344" font-family="Arial, sans-serif" font-size="13" fill="#374151">Peak throughput:</text>
  <text x="870" y="368" font-family="Arial, sans-serif" font-size="13" fill="#374151">Torch hipBLAS, 8192x8192x8192, 1623 TFLOPS</text>
  <text x="870" y="392" font-family="Arial, sans-serif" font-size="13" fill="#374151">Peak HGEMM:</text>
  <text x="870" y="416" font-family="Arial, sans-serif" font-size="13" fill="#374151">4096x4096x8192, 1380 TFLOPS</text>
  <text x="870" y="440" font-family="Arial, sans-serif" font-size="13" fill="#374151">Profiler calls: 100 per kernel</text>
  <text x="870" y="464" font-family="Arial, sans-serif" font-size="13" fill="#374151">Shapes: 6 BF16 benchmark cases</text>
</svg>
