<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="920" viewBox="0 0 1280 920" role="img" aria-labelledby="title desc">
  <title id="title">Hand-drawn mixed Split-K and Slice-K GEMM algorithm</title>
  <desc id="desc">A hand-drawn style technical diagram explaining GEMM tile computation, small-M under-occupancy, Split-K across CTAs, Slice-K inside a CTA, LDS reduction, and global atomic accumulation.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 C3,2 6,3 10,3.5 C6,4 3,5 0,7 Z" fill="#3f3f46"/>
    </marker>
    <pattern id="softGrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M 22 0 L 0 0 0 22" fill="none" stroke="#d8d0bb" stroke-width="1"/>
    </pattern>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.15"/>
    </filter>
    <style>
      .paper { fill: #fffdf2; }
      .ink { stroke: #2f2f35; stroke-width: 2.4; fill: none; stroke-linecap: round; stroke-linejoin: round; filter: url(#rough); }
      .thin { stroke: #6b6257; stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrow { stroke: #3f3f46; stroke-width: 2.3; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); filter: url(#rough); }
      .dash { stroke-dasharray: 7 7; }
      .title { font: 700 30px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #22222a; }
      .subtitle { font: 500 16px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #5f5a50; }
      .label { font: 700 18px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #26262b; }
      .small { font: 500 14px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #4f4a43; }
      .tiny { font: 500 12px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #665f55; }
      .note { font: 500 13px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #7c4a03; }
      .formula { font: 700 17px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #202027; }
      .panel { fill: #fffaf0; stroke: #cfc5ae; stroke-width: 1.8; rx: 18; filter: url(#rough); }
      .blue { fill: #e8edff; stroke: #4f46e5; stroke-width: 2.4; filter: url(#rough); }
      .cyan { fill: #e6fbff; stroke: #0891b2; stroke-width: 2.4; filter: url(#rough); }
      .pink { fill: #fff0f7; stroke: #db2777; stroke-width: 2.4; filter: url(#rough); }
      .orange { fill: #fff1d7; stroke: #f97316; stroke-width: 2.4; filter: url(#rough); }
      .green { fill: #e9fce9; stroke: #16a34a; stroke-width: 2.4; filter: url(#rough); }
      .purple { fill: #f3edff; stroke: #7c3aed; stroke-width: 2.4; filter: url(#rough); }
      .gray { fill: #f6f0e3; stroke: #8a8172; stroke-width: 2; filter: url(#rough); }
    </style>
  </defs>

  <rect class="paper" width="1280" height="920"/>
  <text x="38" y="48" class="title">Mixed Split-K + Slice-K GEMM: how one C tile is computed</text>
  <text x="40" y="78" class="subtitle">The key idea is to expose more parallel work along the long K dimension, first across CTAs, then inside each CTA.</text>

  <!-- 1. Normal GEMM tile -->
  <rect class="panel" x="36" y="108" width="390" height="330"/>
  <circle cx="66" cy="137" r="13" class="gray"/>
  <text x="61" y="142" class="label">1</text>
  <text x="92" y="143" class="label">Start with a normal GEMM tile</text>

  <rect x="82" y="184" width="214" height="132" fill="url(#softGrid)" stroke="#8a8172" stroke-width="2"/>
  <rect class="pink" x="197" y="228" width="72" height="48"/>
  <text x="210" y="257" class="small">C tile</text>
  <text x="170" y="336" class="tiny">C[M, N]</text>
  <text x="70" y="252" class="tiny" transform="rotate(-90 70 252)">M</text>
  <text x="183" y="174" class="tiny">N</text>

  <path class="arrow" d="M 290 254 C 320 254, 334 254, 360 254"/>

  <rect class="blue" x="92" y="366" width="190" height="24"/>
  <rect class="cyan" x="326" y="326" width="28" height="104"/>
  <text x="118" y="383" class="tiny">A tile: Mtile x Kchunk</text>
  <text x="362" y="386" class="tiny" transform="rotate(90 362 386)">B tile: Ntile x Kchunk</text>
  <text x="74" y="414" class="formula">Ctile += A[Mtile,K] x B[Ntile,K]^T</text>

  <!-- 2. Small M pain -->
  <rect class="panel" x="454" y="108" width="368" height="330"/>
  <circle cx="484" cy="137" r="13" class="gray"/>
  <text x="479" y="142" class="label">2</text>
  <text x="510" y="143" class="label">Small M gives too few tiles</text>

  <rect x="496" y="190" width="270" height="82" fill="url(#softGrid)" stroke="#8a8172" stroke-width="2"/>
  <rect class="orange" x="496" y="190" width="70" height="41"/>
  <rect class="orange" x="566" y="190" width="70" height="41" opacity="0.85"/>
  <rect class="orange" x="636" y="190" width="70" height="41" opacity="0.65"/>
  <text x="586" y="299" class="small">few C tiles</text>
  <text x="485" y="238" class="tiny" transform="rotate(-90 485 238)">small M</text>
  <text x="604" y="181" class="tiny">large N</text>

  <g transform="translate(504 326)">
    <rect class="green" x="0" y="0" width="52" height="34"/>
    <rect class="green" x="62" y="0" width="52" height="34"/>
    <rect class="green" x="124" y="0" width="52" height="34"/>
    <rect class="gray" x="186" y="0" width="52" height="34"/>
    <rect class="gray" x="248" y="0" width="52" height="34"/>
    <rect class="gray" x="0" y="46" width="52" height="34"/>
    <rect class="gray" x="62" y="46" width="52" height="34"/>
    <rect class="gray" x="124" y="46" width="52" height="34"/>
    <text x="10" y="22" class="tiny">CTA</text>
    <text x="72" y="22" class="tiny">CTA</text>
    <text x="134" y="22" class="tiny">CTA</text>
    <text x="196" y="22" class="tiny">idle</text>
    <text x="258" y="22" class="tiny">idle</text>
    <text x="12" y="68" class="tiny">idle</text>
    <text x="74" y="68" class="tiny">idle</text>
    <text x="136" y="68" class="tiny">idle</text>
  </g>
  <text x="498" y="424" class="note">K is long, but the output grid is too small to fill the GPU.</text>

  <!-- 3. Split-K -->
  <rect class="panel" x="854" y="108" width="390" height="330"/>
  <circle cx="884" cy="137" r="13" class="gray"/>
  <text x="879" y="142" class="label">3</text>
  <text x="910" y="143" class="label">Split-K creates more CTAs</text>

  <rect class="blue" x="900" y="184" width="282" height="42"/>
  <line x1="994" y1="184" x2="994" y2="226" class="thin"/>
  <line x1="1088" y1="184" x2="1088" y2="226" class="thin"/>
  <text x="940" y="210" class="tiny">K0</text>
  <text x="1034" y="210" class="tiny">K1</text>
  <text x="1128" y="210" class="tiny">K2</text>
  <text x="1014" y="175" class="tiny">split the long K dimension</text>

  <rect class="orange" x="900" y="278" width="82" height="62"/>
  <rect class="green" x="1000" y="278" width="82" height="62"/>
  <rect class="purple" x="1100" y="278" width="82" height="62"/>
  <text x="915" y="304" class="small">CTA 0</text>
  <text x="920" y="324" class="tiny">partial C</text>
  <text x="1015" y="304" class="small">CTA 1</text>
  <text x="1020" y="324" class="tiny">partial C</text>
  <text x="1115" y="304" class="small">CTA 2</text>
  <text x="1120" y="324" class="tiny">partial C</text>

  <path class="arrow" d="M 941 226 L 941 274"/>
  <path class="arrow" d="M 1041 226 L 1041 274"/>
  <path class="arrow" d="M 1141 226 L 1141 274"/>
  <path class="arrow" d="M 982 310 C 1018 366, 1086 366, 1122 348"/>
  <text x="921" y="404" class="formula">Ctile = partial0 + partial1 + partial2</text>
  <text x="912" y="426" class="note">More CTAs, but each CTA can still need more internal K parallelism.</text>

  <!-- 4. Slice-K -->
  <rect class="panel" x="62" y="474" width="548" height="370"/>
  <circle cx="92" cy="505" r="13" class="gray"/>
  <text x="87" y="510" class="label">4</text>
  <text x="118" y="511" class="label">Slice-K splits one CTA's K tile across warp groups</text>

  <rect class="blue" x="104" y="560" width="220" height="52"/>
  <line x1="159" y1="560" x2="159" y2="612" class="thin"/>
  <line x1="214" y1="560" x2="214" y2="612" class="thin"/>
  <line x1="269" y1="560" x2="269" y2="612" class="thin"/>
  <text x="122" y="590" class="tiny">slice0</text>
  <text x="177" y="590" class="tiny">slice1</text>
  <text x="232" y="590" class="tiny">slice2</text>
  <text x="287" y="590" class="tiny">slice3</text>
  <text x="128" y="548" class="tiny">one CTA's K tile</text>

  <rect class="orange" x="104" y="674" width="96" height="62"/>
  <rect class="green" x="222" y="674" width="96" height="62"/>
  <rect class="purple" x="340" y="674" width="96" height="62"/>
  <rect class="cyan" x="458" y="674" width="96" height="62"/>
  <text x="120" y="700" class="small">warp g0</text>
  <text x="128" y="720" class="tiny">partial</text>
  <text x="238" y="700" class="small">warp g1</text>
  <text x="246" y="720" class="tiny">partial</text>
  <text x="356" y="700" class="small">warp g2</text>
  <text x="364" y="720" class="tiny">partial</text>
  <text x="474" y="700" class="small">warp g3</text>
  <text x="482" y="720" class="tiny">partial</text>

  <path class="arrow" d="M 132 612 L 148 670"/>
  <path class="arrow" d="M 187 612 L 270 670"/>
  <path class="arrow" d="M 242 612 L 388 670"/>
  <path class="arrow" d="M 297 612 L 506 670"/>

  <rect class="purple" x="234" y="780" width="204" height="42"/>
  <text x="274" y="806" class="label">LDS local reduce</text>
  <path class="arrow" d="M 152 736 C 184 772, 222 784, 236 796"/>
  <path class="arrow" d="M 270 736 L 296 778"/>
  <path class="arrow" d="M 388 736 L 374 778"/>
  <path class="arrow" d="M 506 736 C 482 768, 446 788, 438 798"/>

  <!-- 5. Final reduction -->
  <rect class="panel" x="642" y="474" width="576" height="370"/>
  <circle cx="672" cy="505" r="13" class="gray"/>
  <text x="667" y="510" class="label">5</text>
  <text x="698" y="511" class="label">Two-level reduction path</text>

  <rect class="purple" x="696" y="574" width="152" height="58"/>
  <text x="728" y="598" class="label">within CTA</text>
  <text x="734" y="618" class="tiny">LDS reduce</text>

  <path class="arrow" d="M 848 603 L 930 603"/>

  <rect class="pink" x="940" y="566" width="170" height="74"/>
  <text x="975" y="596" class="label">across CTAs</text>
  <text x="974" y="620" class="tiny">global atomic add</text>

  <path class="arrow" d="M 1025 640 L 1025 700"/>
  <rect class="pink" x="950" y="706" width="150" height="58"/>
  <text x="985" y="740" class="label">final C tile</text>

  <rect class="gray" x="704" y="704" width="180" height="74"/>
  <text x="724" y="732" class="small">signal[] ensures</text>
  <text x="724" y="754" class="small">C initialized first</text>
  <path class="arrow dash" d="M 884 738 C 916 730, 930 730, 948 730"/>

  <text x="704" y="822" class="note">Split-K handles GPU occupancy; Slice-K handles CTA utilization.</text>
</svg>
