<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
<title id="title">Interactive LLM Decode Serving</title>
<desc id="desc">Prefill happens once; decode repeats small-M GEMMs on the critical token path.</desc>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,4 L0,8 Z" fill="#334155"/></marker>
  <style>
    .bg{fill:#fffaf0}.panel{fill:#fffdf7;stroke:#c9bfae;stroke-width:2;rx:20}.panel2{fill:#fffdf7;stroke:#c9bfae;stroke-width:2;rx:14}
    .title{font:800 32px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#1f2937}.subtitle{font:500 16px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#5f5a50}.section{font:800 18px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#1f2937}
    .label{font:700 14px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#1f2937}.small{font:500 13px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#5f5a50}.tiny{font:600 11px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#665f55}.axis{font:700 12px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#665f55}.num{font:800 18px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#1f2937}.stat{font:800 26px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#1f2937}
    .grid{fill:#ffffff;stroke:#cbd5e1;stroke-width:1}.a{fill:#dbeafe;stroke:#2563eb;stroke-width:1.7}.b{fill:#ccfbf1;stroke:#0f766e;stroke-width:1.7}.c{fill:#ffedd5;stroke:#f97316;stroke-width:1.5}.hot{fill:#fce7f3;stroke:#db2777;stroke-width:3}.k0{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.k1{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.k2{fill:#fef3c7;stroke:#f59e0b;stroke-width:2}.k3{fill:#fce7f3;stroke:#db2777;stroke-width:2}
    .stage{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.lds{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:12}.mfma{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:12}.ok{fill:#ecfdf5;stroke:#10b981;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#f59e0b;stroke-width:2;rx:12}.bad{fill:#fef2f2;stroke:#ef4444;stroke-width:2;rx:12}.arrow{stroke:#3f3f46;stroke-width:2.4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:6 6}.muted{fill:#f1f5f9;stroke:#94a3b8;stroke-width:1.2}.line{fill:none;stroke-width:3;stroke-linejoin:round;stroke-linecap:round}.tick{stroke:#e2e8f0;stroke-width:1}
  </style>
</defs>
<rect class="bg" width="1280" height="560"/>
<text x="44" y="52" class="title">Interactive LLM Serving: Decode GEMM is on the token path</text>
<text x="44" y="82" class="subtitle">Prefill has a larger token batch; decode repeats many small-M GEMMs one token step at a time.</text>
<rect class="panel" x="44" y="122" width="1192" height="340" data-sketch="1"/><rect x="43.6" y="122.0" width="1192" height="340" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/>
<rect class="stage" x="90" y="206" width="160" height="72" data-sketch="1"/><rect x="89.7" y="206.6" width="160" height="72" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="122" y="238" class="label">user request</text><text x="118" y="260" class="tiny">chat / code / agent</text>
<path class="arrow" d="M250 242 L320 242" data-sketch="1"/><path d="M250 242 L320 242" stroke="#3f3f46" stroke-width="1.1" opacity="0.45" fill="none"/>
<rect class="ok" x="326" y="174" width="220" height="136" data-sketch="1"/><rect x="325.3" y="174.0" width="220" height="136" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="406" y="218" class="section">Prefill</text><text x="374" y="244" class="small">many prompt tokens</text><text x="384" y="268" class="small">larger effective M</text>
<path class="arrow" d="M546 242 L620 242" data-sketch="1"/><path d="M546 242 L620 242" stroke="#3f3f46" stroke-width="1.1" opacity="0.45" fill="none"/>
<rect class="warn" x="626" y="160" width="96" height="164" data-sketch="1"/><rect x="625.6" y="159.7" width="96" height="164" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="648" y="194" class="label">Decode</text><text x="658" y="216" class="tiny">step 1</text><rect class="hot" x="648" y="246" width="52" height="38" data-sketch="1"/><rect x="648.7" y="246.0" width="52" height="38" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="656" y="270" class="tiny">GEMM</text><path class="arrow" d="M722 242 L742 242" data-sketch="1"/><path d="M722 242 L742 242" stroke="#3f3f46" stroke-width="1.1" opacity="0.45" fill="none"/><rect class="warn" x="742" y="160" width="96" height="164" data-sketch="1"/><rect x="742.0" y="160.0" width="96" height="164" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="764" y="194" class="label">Decode</text><text x="774" y="216" class="tiny">step 2</text><rect class="hot" x="764" y="246" width="52" height="38" data-sketch="1"/><rect x="763.3" y="246.3" width="52" height="38" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="772" y="270" class="tiny">GEMM</text><path class="arrow" d="M838 242 L858 242" data-sketch="1"/><path d="M838 242 L858 242" stroke="#3f3f46" stroke-width="1.1" opacity="0.45" fill="none"/><rect class="warn" x="858" y="160" width="96" height="164" data-sketch="1"/><rect x="858.4" y="160.3" width="96" height="164" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="880" y="194" class="label">Decode</text><text x="890" y="216" class="tiny">step 3</text><rect class="hot" x="880" y="246" width="52" height="38" data-sketch="1"/><rect x="879.6" y="246.6" width="52" height="38" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="888" y="270" class="tiny">GEMM</text><path class="arrow" d="M954 242 L974 242" data-sketch="1"/><path d="M954 242 L974 242" stroke="#3f3f46" stroke-width="1.1" opacity="0.45" fill="none"/><rect class="warn" x="974" y="160" width="96" height="164" data-sketch="1"/><rect x="974.7" y="160.6" width="96" height="164" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="996" y="194" class="label">Decode</text><text x="1006" y="216" class="tiny">step 4</text><rect class="hot" x="996" y="246" width="52" height="38" data-sketch="1"/><rect x="996.0" y="245.4" width="52" height="38" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="1004" y="270" class="tiny">GEMM</text><path class="arrow dash" d="M1070 160 C1138 112 1194 150 1178 218" data-sketch="1"/><path d="M1070 160 C1138 112 1194 150 1178 218" stroke="#3f3f46" stroke-width="1.1" opacity="0.45" fill="none"/>
<text x="1090" y="124" class="small">repeat until response ends</text>
<rect class="panel2" x="292" y="370" width="744" height="58" data-sketch="1"/><rect x="292.0" y="370.0" width="744" height="58" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="324" y="405" class="label">Latency metrics: TTFT + TPOT + inter-token latency</text><text x="718" y="405" class="small">small repeated kernels become visible</text>
</svg>
