<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-labelledby="title desc">
<title id="title">Animated LDS-Pipelined Split-K tiled GEMM flow</title>
<desc id="desc">A selected C tile is computed from multiple K ranges, reduced inside a CTA through LDS, then accumulated across Split-K CTAs.</desc>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4 L0,8 Z" fill="#334155"/>
  </marker>
  <style>
    .bg{fill:#fffaf0}.paper{fill:#fffdf7;stroke:#c9bfae;stroke-width:2;rx:22}
    .title{font:800 32px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#1f2937}
    .subtitle{font:500 16px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#5f5a50}
    .section{font:800 18px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#1f2937}
    .label{font:700 14px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#1f2937}
    .small{font:500 13px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#5f5a50}
    .tiny{font:600 11px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#665f55}
    .grid{fill:#ffffff;stroke:#cbd5e1;stroke-width:1}
    .a{fill:#dbeafe;stroke:#2563eb;stroke-width:1.6}.b{fill:#ccfbf1;stroke:#0f766e;stroke-width:1.6}
    .c{fill:#ffedd5;stroke:#f97316;stroke-width:1.6}.hot{fill:#fce7f3;stroke:#db2777;stroke-width:3}
    .k0{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.k1{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.k2{fill:#fef3c7;stroke:#f59e0b;stroke-width:2}
    .cta{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:12}.lds{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:12}
    .ok{fill:#ecfdf5;stroke:#10b981;stroke-width:2;rx:12}.stage{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}
    .arrow{stroke:#3f3f46;stroke-width:2.4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
    .ghost{fill:none;stroke:#c9bfae;stroke-width:1;opacity:.45}.flow{stroke:#7c3aed;stroke-width:4;fill:none;stroke-linecap:round;stroke-dasharray:12 12;animation:dash 1.4s linear infinite}
    .phase0{animation:phase0 8s infinite}.phase1{animation:phase1 8s infinite}.phase2{animation:phase2 8s infinite}.phase3{animation:phase3 8s infinite}
    .pulse{fill:none;stroke:#7c3aed;stroke-width:4;rx:18;filter:url(#softGlow)}
    .token{stroke:#1f2937;stroke-width:1.4;rx:7}
    .fade0{animation:fade0 8s infinite}.fade1{animation:fade1 8s infinite}.fade2{animation:fade2 8s infinite}.fade3{animation:fade3 8s infinite}
    @keyframes dash{to{stroke-dashoffset:-24}}
    @keyframes phase0{0%,22%{opacity:1}28%,100%{opacity:.18}}
    @keyframes phase1{0%,20%{opacity:.18}27%,47%{opacity:1}53%,100%{opacity:.18}}
    @keyframes phase2{0%,68%{opacity:.18}74%,88%{opacity:1}94%,100%{opacity:.35}}
    @keyframes phase3{0%,45%{opacity:.18}52%,68%{opacity:1}74%,100%{opacity:.18}}
    @keyframes fade0{0%,22%{opacity:1}28%,100%{opacity:.35}}
    @keyframes fade1{0%,20%{opacity:.35}27%,47%{opacity:1}53%,100%{opacity:.35}}
    @keyframes fade2{0%,45%{opacity:.35}52%,72%{opacity:1}78%,100%{opacity:.35}}
    @keyframes fade3{0%,70%{opacity:.35}78%,96%{opacity:1}100%{opacity:.5}}
  </style>
  <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect class="bg" width="1500" height="920"/>
<text x="42" y="54" class="title">LDS-Pipelined Split-K: one C tile, many K ranges</text>
<text x="44" y="84" class="subtitle">Animated view: K ranges become Split-K CTAs, local K slices reduce in LDS, then partial C accumulates globally.</text>

<rect class="paper" x="44" y="120" width="650" height="330"/>
<rect class="ghost" x="43.4" y="119.4" width="650" height="330" rx="22"/>
<text x="74" y="160" class="section">1. Start from one selected C tile</text>
<text x="92" y="210" class="label">A[M,K]</text>
<g>
  <rect class="grid" x="92" y="232" width="36" height="30"/><rect class="grid" x="128" y="232" width="36" height="30"/><rect class="grid" x="164" y="232" width="36" height="30"/><rect class="grid" x="200" y="232" width="36" height="30"/><rect class="grid" x="236" y="232" width="36" height="30"/><rect class="grid" x="272" y="232" width="36" height="30"/><rect class="grid" x="308" y="232" width="36" height="30"/>
  <rect class="k0 fade0" x="92" y="262" width="72" height="30"/><rect class="k1 fade1" x="164" y="262" width="72" height="30"/><rect class="k2 fade2" x="236" y="262" width="72" height="30"/><rect class="grid" x="308" y="262" width="36" height="30"/>
  <text x="112" y="282" class="tiny">K0</text><text x="184" y="282" class="tiny">K1</text><text x="256" y="282" class="tiny">K2</text>
</g>
<text x="92" y="338" class="label">B^T[K,N]</text>
<g>
  <rect class="grid" x="108" y="360" width="40" height="16"/><rect class="grid" x="148" y="360" width="40" height="16"/><rect class="k0 fade0" x="188" y="360" width="40" height="32"/><rect class="grid" x="228" y="360" width="40" height="16"/>
  <rect class="grid" x="108" y="376" width="40" height="16"/><rect class="grid" x="148" y="376" width="40" height="16"/><rect class="grid" x="228" y="376" width="40" height="16"/>
  <rect class="grid" x="108" y="392" width="40" height="16"/><rect class="grid" x="148" y="392" width="40" height="16"/><rect class="k1 fade1" x="188" y="392" width="40" height="32"/><rect class="grid" x="228" y="392" width="40" height="16"/>
  <rect class="grid" x="108" y="408" width="40" height="16"/><rect class="grid" x="148" y="408" width="40" height="16"/><rect class="grid" x="228" y="408" width="40" height="16"/>
  <rect class="grid" x="108" y="424" width="40" height="16"/><rect class="grid" x="148" y="424" width="40" height="16"/><rect class="k2 fade2" x="188" y="424" width="40" height="16"/><rect class="grid" x="228" y="424" width="40" height="16"/>
</g>
<text x="485" y="210" class="label">C[M,N]</text>
<g>
  <rect class="c" x="476" y="232" width="54" height="44"/><rect class="hot phase0" x="530" y="232" width="54" height="44"/><rect class="c" x="584" y="232" width="54" height="44"/>
  <rect class="c" x="476" y="276" width="54" height="44"/><rect class="c" x="530" y="276" width="54" height="44"/><rect class="c" x="584" y="276" width="54" height="44"/>
</g>
<path class="arrow phase0" d="M350 272 C405 252 440 244 474 250"/>
<path class="arrow phase0" d="M278 398 C365 390 430 330 524 278"/>
<text x="382" y="358" class="section phase0">C tile = sum over K</text>
<rect class="pulse phase0" x="72" y="180" width="590" height="245"/>

<rect class="paper" x="745" y="120" width="710" height="330"/>
<rect class="ghost" x="744.4" y="119.4" width="710" height="330" rx="22"/>
<text x="775" y="160" class="section">2. Inter-CTA Split-K creates partial C tiles</text>
<text x="775" y="186" class="small">Each Split-K CTA owns a different K range.</text>
<g class="phase1">
  <rect class="k0" x="802" y="235" width="110" height="58"/><text x="840" y="270" class="label">K0</text>
  <rect class="k1" x="990" y="235" width="110" height="58"/><text x="1028" y="270" class="label">K1</text>
  <rect class="k2" x="1178" y="235" width="110" height="58"/><text x="1216" y="270" class="label">K2</text>
  <path class="arrow" d="M857 294 L857 345"/><path class="arrow" d="M1045 294 L1045 345"/><path class="arrow" d="M1233 294 L1233 345"/>
  <rect class="cta" x="817" y="352" width="82" height="50"/><text x="833" y="382" class="tiny">partial</text>
  <rect class="cta" x="1005" y="352" width="82" height="50"/><text x="1021" y="382" class="tiny">partial</text>
  <rect class="cta" x="1193" y="352" width="82" height="50"/><text x="1209" y="382" class="tiny">partial</text>
  <path class="flow" d="M900 377 C960 430 1130 430 1190 377"/>
</g>
<rect class="pulse phase1" x="770" y="206" width="635" height="220"/>

<rect class="paper" x="44" y="500" width="650" height="350"/>
<rect class="ghost" x="43.4" y="499.4" width="650" height="350" rx="22"/>
<text x="74" y="540" class="section">4. LDS reduce, then global atomic add</text>
<text x="74" y="566" class="small">K-slice partials combine locally before inter-CTA accumulation.</text>
<g class="phase2">
  <rect class="k1" x="92" y="620" width="92" height="44"/><text x="116" y="648" class="tiny">slice 0</text>
  <rect class="k1" x="212" y="620" width="92" height="44"/><text x="236" y="648" class="tiny">slice 1</text>
  <rect class="k1" x="332" y="620" width="92" height="44"/><text x="356" y="648" class="tiny">slice 2</text>
  <rect class="k1" x="452" y="620" width="92" height="44"/><text x="476" y="648" class="tiny">slice 3</text>
  <path class="arrow" d="M138 664 L138 718"/><path class="arrow" d="M258 664 L258 718"/><path class="arrow" d="M378 664 L378 718"/><path class="arrow" d="M498 664 L498 718"/>
  <rect class="stage" x="96" y="724" width="92" height="46"/><text x="116" y="752" class="tiny">warp</text>
  <rect class="stage" x="216" y="724" width="92" height="46"/><text x="236" y="752" class="tiny">warp</text>
  <rect class="stage" x="336" y="724" width="92" height="46"/><text x="356" y="752" class="tiny">warp</text>
  <rect class="stage" x="456" y="724" width="92" height="46"/><text x="476" y="752" class="tiny">warp</text>
  <path class="flow" d="M138 772 C230 825 410 825 500 772"/>
  <rect class="lds" x="252" y="792" width="180" height="46"/><text x="302" y="821" class="label">LDS reduce</text>
  <path class="arrow" d="M432 815 L474 815"/>
  <rect class="ok" x="482" y="792" width="130" height="46"/><text x="510" y="821" class="label">atomic add</text>
</g>
<rect class="pulse phase2" x="70" y="594" width="560" height="245"/>

<rect class="paper" x="745" y="500" width="710" height="350"/>
<rect class="ghost" x="744.4" y="499.4" width="710" height="350" rx="22"/>
<text x="775" y="540" class="section">3. Multi-stage pipeline feeds MFMA</text>
<text x="775" y="566" class="small">One K block computes while later blocks are already staged.</text>
<g class="phase3">
  <rect class="stage" x="798" y="645" width="145" height="70"/><text x="842" y="674" class="label">K i+2</text><text x="828" y="696" class="tiny">async copy</text>
  <path class="arrow" d="M943 680 L982 680"/>
  <rect class="lds" x="990" y="645" width="145" height="70"/><text x="1034" y="674" class="label">K i+1</text><text x="1024" y="696" class="tiny">LDS ready</text>
  <path class="arrow" d="M1135 680 L1174 680"/>
  <rect class="cta" x="1182" y="645" width="145" height="70"/><text x="1228" y="674" class="label">K i</text><text x="1218" y="696" class="tiny">MFMA</text>
  <path class="arrow" d="M1254 715 C1240 758 1186 780 1118 780"/>
  <rect class="ok" x="968" y="755" width="190" height="54"/><text x="1018" y="789" class="label">partial C</text>
</g>
<rect class="pulse phase3" x="775" y="615" width="590" height="215"/>

<rect class="token k0" x="120" y="250" width="22" height="22">
  <animate attributeName="x" values="120;850;850;1250;340;545;120" keyTimes="0;.24;.43;.60;.78;.90;1" dur="8s" repeatCount="indefinite"/>
  <animate attributeName="y" values="250;260;378;680;814;814;250" keyTimes="0;.24;.43;.60;.78;.90;1" dur="8s" repeatCount="indefinite"/>
</rect>
<rect class="token k1" x="190" y="250" width="22" height="22">
  <animate attributeName="x" values="190;1038;1038;1062;340;545;190" keyTimes="0;.24;.43;.60;.78;.90;1" dur="8s" repeatCount="indefinite"/>
  <animate attributeName="y" values="250;260;378;680;814;814;250" keyTimes="0;.24;.43;.60;.78;.90;1" dur="8s" repeatCount="indefinite"/>
</rect>
<rect class="token k2" x="260" y="250" width="22" height="22">
  <animate attributeName="x" values="260;1226;1226;870;340;545;260" keyTimes="0;.24;.43;.60;.78;.90;1" dur="8s" repeatCount="indefinite"/>
  <animate attributeName="y" values="250;260;378;680;814;814;250" keyTimes="0;.24;.43;.60;.78;.90;1" dur="8s" repeatCount="indefinite"/>
</rect>
</svg>
