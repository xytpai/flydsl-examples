<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Multi-stage Stream-K memory pipeline with tiled GEMM</title>
  <desc id="desc">A tile-based diagram showing how A and B tiles for consecutive K blocks move through async copy, LDS stages, MFMA compute, and C accumulation inside one CTA.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#263238"/>
    </marker>
    <style>
      .bg { fill: #fffaf0;}
      .card { fill: #fffdf7; stroke: #ded6c3; stroke-width: 1.5; rx: 22;}
      .title { font: 800 34px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #172033;}
      .subtitle { font: 500 17px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #5b6472;}
      .step { font: 800 19px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #172033;}
      .label { font: 700 15px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #172033;}
      .small { font: 500 13px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #4b5563;}
      .tiny { font: 600 11px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #64748b;}
      .math { font: 800 18px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #111827;}
      .axis { font: 700 12px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #64748b;}
      .tile { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1;}
      .a0 { fill: #e8edff; stroke: #4f46e5; stroke-width: 2;}
      .a1 { fill: #ecfeff; stroke: #0891b2; stroke-width: 2;}
      .a2 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2;}
      .b0 { fill: #f5e8ff; stroke: #7c3aed; stroke-width: 2;}
      .b1 { fill: #ffedd5; stroke: #f97316; stroke-width: 2;}
      .b2 { fill: #ffe4f1; stroke: #db2777; stroke-width: 2;}
      .c { fill: #fff7ed; stroke: #f97316; stroke-width: 1.4;}
      .csel { fill: #ffe4f1; stroke: #db2777; stroke-width: 3;}
      .gmem { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 10;}
      .lds { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 10;}
      .mfma { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 10;}
      .acc { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 10;}
      .ring { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 12;}
      .note { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.8; rx: 14;}
      .arrow { stroke: #263238; stroke-width: 2.4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round}
      .sketch {}
    </style>
  </defs>

  <rect class="bg" width="1500" height="900"/>
  <text x="42" y="54" class="title">Multi-Stage Stream-K Memory Pipeline</text>
  <text x="44" y="84" class="subtitle">Inside one CTA, consecutive K tiles are overlapped: one computes, one waits in LDS, and one is copied from global memory.</text>

  <rect class="card" x="40" y="120" width="660" height="350"/>
  <text x="70" y="158" class="step">1. One CTA computes one output tile over a K stream</text>
  <text x="70" y="188" class="small">The same C tile accumulates contributions from K block i, i+1, i+2, ...</text>

  <text x="82" y="236" class="label">A tile row</text>
  <text x="252" y="236" class="axis">K blocks</text>
  <g transform="translate(82 254)">
    <rect class="a0" x="0" y="0" width="48" height="42"/>
    <rect class="a0" x="48" y="0" width="48" height="42"/>
    <rect class="a1" x="96" y="0" width="48" height="42"/>
    <rect class="a1" x="144" y="0" width="48" height="42"/>
    <rect class="a2" x="192" y="0" width="48" height="42"/>
    <rect class="a2" x="240" y="0" width="48" height="42"/>
    <rect class="tile" x="288" y="0" width="48" height="42"/>
    <rect class="tile" x="336" y="0" width="48" height="42"/>
    <text x="30" y="66" class="tiny">K i</text>
    <text x="126" y="66" class="tiny">K i+1</text>
    <text x="222" y="66" class="tiny">K i+2</text>
  </g>

  <text x="82" y="374" class="label">B^T tile column</text>
  <g transform="translate(244 320)">
    <rect class="b0" x="0" y="0" width="44" height="30"/>
    <rect class="b0" x="0" y="30" width="44" height="30"/>
    <rect class="b1" x="0" y="60" width="44" height="30"/>
    <rect class="b1" x="0" y="90" width="44" height="30"/>
    <rect class="b2" x="0" y="120" width="44" height="30"/>
    <rect class="b2" x="0" y="150" width="44" height="30"/>
    <text x="58" y="20" class="tiny">K i</text>
    <text x="58" y="80" class="tiny">K i+1</text>
    <text x="58" y="140" class="tiny">K i+2</text>
  </g>

  <path class="arrow" d="M 486 292 C 540 282, 570 278, 620 276"/>
  <path class="arrow" d="M 328 410 C 420 430, 540 386, 620 314"/>
  <g transform="translate(620 246)">
    <text x="0" y="-14" class="label">C tile</text>
    <rect class="csel" x="0" y="0" width="62" height="52"/>
    <rect class="c" x="62" y="0" width="62" height="52"/>
    <rect class="c" x="0" y="52" width="62" height="52"/>
    <rect class="c" x="62" y="52" width="62" height="52"/>
  </g>
  <text x="440" y="430" class="math">C += A[K block] x B[K block]</text>

  <rect class="card" x="740" y="120" width="720" height="350"/>
  <text x="770" y="158" class="step">2. At time t, three K blocks occupy three pipeline states</text>
  <text x="770" y="188" class="small">The stage ring keeps global memory, LDS, and MFMA busy at the same time.</text>

  <rect class="gmem" x="782" y="238" width="152" height="74"/>
  <text x="814" y="264" class="label">K i+2</text>
  <text x="800" y="287" class="tiny">global memory copy</text>
  <text x="812" y="303" class="tiny">write_stage</text>
  <path class="arrow" d="M 934 276 L 1010 276"/>

  <rect class="lds" x="1020" y="238" width="152" height="74"/>
  <text x="1054" y="264" class="label">K i+1</text>
  <text x="1050" y="287" class="tiny">ready in LDS</text>
  <text x="1052" y="303" class="tiny">next stage</text>
  <path class="arrow" d="M 1172 276 L 1248 276"/>

  <rect class="mfma" x="1258" y="238" width="152" height="74"/>
  <text x="1298" y="264" class="label">K i</text>
  <text x="1286" y="287" class="tiny">ldmatrix + MFMA</text>
  <text x="1284" y="303" class="tiny">current_stage</text>

  <path class="arrow" d="M 1334 312 C 1326 356, 1262 374, 1188 374"/>
  <rect class="acc" x="1004" y="348" width="184" height="66"/>
  <text x="1040" y="375" class="label">C fragments</text>
  <text x="1032" y="397" class="tiny">accumulate partial sum</text>

  <rect class="note" x="790" y="354" width="172" height="62"/>
  <text x="816" y="379" class="label">after one step</text>
  <text x="810" y="401" class="tiny">i+1 becomes compute</text>

  <rect class="card" x="40" y="520" width="1420" height="300"/>
  <text x="70" y="558" class="step">3. The ring advances while the mathematical accumulation stays the same</text>
  <text x="70" y="588" class="small">Each row is one moment in the hot loop. Colors track the same K blocks as they move through the stage ring.</text>

  <text x="132" y="650" class="label">time t</text>
  <rect class="mfma" x="234" y="620" width="132" height="54"/>
  <text x="266" y="642" class="tiny">compute K i</text>
  <text x="270" y="660" class="tiny">stage s</text>
  <rect class="lds" x="418" y="620" width="132" height="54"/>
  <text x="446" y="642" class="tiny">ready K i+1</text>
  <text x="452" y="660" class="tiny">stage s+1</text>
  <rect class="gmem" x="602" y="620" width="132" height="54"/>
  <text x="628" y="642" class="tiny">copy K i+2</text>
  <text x="636" y="660" class="tiny">write_stage</text>
  <rect class="acc" x="820" y="620" width="150" height="54"/>
  <text x="852" y="652" class="tiny">C += partial i</text>

  <path class="arrow" d="M 366 647 L 412 647"/>
  <path class="arrow" d="M 550 647 L 596 647"/>
  <path class="arrow" d="M 734 647 L 814 647"/>

  <text x="132" y="746" class="label">time t+1</text>
  <rect class="mfma" x="234" y="716" width="132" height="54"/>
  <text x="260" y="738" class="tiny">compute K i+1</text>
  <text x="270" y="756" class="tiny">stage s+1</text>
  <rect class="lds" x="418" y="716" width="132" height="54"/>
  <text x="446" y="738" class="tiny">ready K i+2</text>
  <text x="452" y="756" class="tiny">stage s+2</text>
  <rect class="gmem" x="602" y="716" width="132" height="54"/>
  <text x="628" y="738" class="tiny">copy K i+3</text>
  <text x="636" y="756" class="tiny">write_stage</text>
  <rect class="acc" x="820" y="716" width="150" height="54"/>
  <text x="842" y="748" class="tiny">C += partial i+1</text>

  <path class="arrow" d="M 366 743 L 412 743"/>
  <path class="arrow" d="M 550 743 L 596 743"/>
  <path class="arrow" d="M 734 743 L 814 743"/>

  <rect class="ring" x="1052" y="620" width="330" height="150"/>
  <text x="1084" y="654" class="label">Ring-buffer rule</text>
  <text x="1084" y="684" class="small">current_stage is consumed by MFMA.</text>
  <text x="1084" y="710" class="small">write_stage receives the next async copy.</text>
  <text x="1084" y="736" class="small">Then the stage index rotates.</text>
</svg>
