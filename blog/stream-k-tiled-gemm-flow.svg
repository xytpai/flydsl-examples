<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-labelledby="title desc">
<title id="title">Mixed Stream-K tiled GEMM flow</title>
<desc id="desc">Selected C tile computed from A and B K ranges, then reduced across local and global parallelism.</desc>
