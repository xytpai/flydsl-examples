<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">Mixed Stream-K tiled GEMM algorithm flow</title>
  <desc id="desc">A tiled matrix diagram showing how a C tile is computed from A and B tiles, how K is split across CTAs, how each CTA slices K across warp groups, and how the partial sums are reduced.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#263238"/>
    </marker>
    <style>
      .bg { fill: #fffaf0;}
      .card { fill: #fffdf7; stroke: #ded6c3; stroke-width: 1.5; rx: 22;}
      .title { font: 800 34px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #172033;}
      .subtitle { font: 500 17px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #5b6472;}
      .step { font: 800 18px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #172033;}
      .label { font: 700 16px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #172033;}
      .small { font: 500 13px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #4b5563;}
      .tiny { font: 600 11px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #64748b;}
      .math { font: 800 18px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #111827;}
      .axis { font: 700 12px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #64748b;}
      .arrow { stroke: #263238; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round}
      .dash { stroke-dasharray: 7 6;}
      .tile { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1;}
      .a0 { fill: #dfe7ff; stroke: #4f46e5; stroke-width: 2;}
      .a1 { fill: #d7f6ff; stroke: #0891b2; stroke-width: 2;}
      .a2 { fill: #dcfce7; stroke: #16a34a; stroke-width: 2;}
      .b0 { fill: #f4e8ff; stroke: #7c3aed; stroke-width: 2;}
      .b1 { fill: #ffedd5; stroke: #f97316; stroke-width: 2;}
      .b2 { fill: #ffe4f1; stroke: #db2777; stroke-width: 2;}
      .c { fill: #fff7ed; stroke: #f97316; stroke-width: 1.2;}
      .csel { fill: #ffe4f1; stroke: #db2777; stroke-width: 3;}
      .partial0 { fill: #e8edff; stroke: #4f46e5; stroke-width: 2; rx: 10;}
      .partial1 { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 10;}
      .partial2 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 10;}
      .warp { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 8;}
      .lds { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.5; rx: 12;}
      .atomic { fill: #fdf2f8; stroke: #db2777; stroke-width: 2.5; rx: 12;}
      .pipeline { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 12;}
      .note { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1.5; rx: 14;}
      .sketch {}
    </style>
  </defs>

  <rect class="bg" width="1500" height="980"/>
  <text x="42" y="54" class="title">Mixed Stream-K GEMM: tiled matrix view</text>
  <text x="44" y="84" class="subtitle">A selected C tile is accumulated from multiple K tile ranges, then reduced across CTAs and warp groups.</text>

  <!-- Step 1 card: actual tiled GEMM -->
  <rect class="card" x="40" y="118" width="930" height="430"/>
  <text x="68" y="154" class="step">1. Start from tiled GEMM: C[M,N] = A[M,K] @ B[N,K]^T</text>

  <!-- A matrix -->
  <text x="82" y="196" class="label">A[M, K]</text>
  <text x="226" y="196" class="axis">K tiles</text>
  <text x="52" y="288" class="axis" transform="rotate(-90 52 288)">M tiles</text>
  <g transform="translate(82 212)">
    <!-- A grid 3 x 9 -->
    <rect class="tile" x="0" y="0" width="36" height="34"/>
    <rect class="tile" x="36" y="0" width="36" height="34"/>
    <rect class="tile" x="72" y="0" width="36" height="34"/>
    <rect class="tile" x="108" y="0" width="36" height="34"/>
    <rect class="tile" x="144" y="0" width="36" height="34"/>
    <rect class="tile" x="180" y="0" width="36" height="34"/>
    <rect class="tile" x="216" y="0" width="36" height="34"/>
    <rect class="tile" x="252" y="0" width="36" height="34"/>
    <rect class="tile" x="288" y="0" width="36" height="34"/>
    <rect class="a0" x="0" y="34" width="36" height="34"/>
    <rect class="a0" x="36" y="34" width="36" height="34"/>
    <rect class="a0" x="72" y="34" width="36" height="34"/>
    <rect class="a1" x="108" y="34" width="36" height="34"/>
    <rect class="a1" x="144" y="34" width="36" height="34"/>
    <rect class="a1" x="180" y="34" width="36" height="34"/>
    <rect class="a2" x="216" y="34" width="36" height="34"/>
    <rect class="a2" x="252" y="34" width="36" height="34"/>
    <rect class="a2" x="288" y="34" width="36" height="34"/>
    <rect class="tile" x="0" y="68" width="36" height="34"/>
    <rect class="tile" x="36" y="68" width="36" height="34"/>
    <rect class="tile" x="72" y="68" width="36" height="34"/>
    <rect class="tile" x="108" y="68" width="36" height="34"/>
    <rect class="tile" x="144" y="68" width="36" height="34"/>
    <rect class="tile" x="180" y="68" width="36" height="34"/>
    <rect class="tile" x="216" y="68" width="36" height="34"/>
    <rect class="tile" x="252" y="68" width="36" height="34"/>
    <rect class="tile" x="288" y="68" width="36" height="34"/>
    <text x="36" y="124" class="tiny">K range 0</text>
    <text x="142" y="124" class="tiny">K range 1</text>
    <text x="250" y="124" class="tiny">K range 2</text>
  </g>

  <!-- B^T matrix -->
  <text x="82" y="402" class="label">B^T[K, N]</text>
  <text x="226" y="402" class="axis">N tiles</text>
  <text x="52" y="464" class="axis" transform="rotate(-90 52 464)">K tiles</text>
  <g transform="translate(82 418)">
    <!-- B^T grid 9 x 5; selected N col tiles highlighted by K ranges -->
    <rect class="b0" x="72" y="0" width="38" height="24"/>
    <rect class="b0" x="72" y="24" width="38" height="24"/>
    <rect class="b0" x="72" y="48" width="38" height="24"/>
    <rect class="b1" x="72" y="72" width="38" height="24"/>
    <rect class="b1" x="72" y="96" width="38" height="24"/>
    <rect class="b1" x="72" y="120" width="38" height="24"/>
    <rect class="b2" x="72" y="144" width="38" height="24"/>
    <rect class="b2" x="72" y="168" width="38" height="24"/>
    <rect class="b2" x="72" y="192" width="38" height="24"/>
    <rect class="tile" x="0" y="0" width="38" height="24"/>
    <rect class="tile" x="38" y="0" width="38" height="24"/>
    <rect class="tile" x="110" y="0" width="38" height="24"/>
    <rect class="tile" x="148" y="0" width="38" height="24"/>
    <rect class="tile" x="0" y="24" width="38" height="24"/>
    <rect class="tile" x="38" y="24" width="38" height="24"/>
    <rect class="tile" x="110" y="24" width="38" height="24"/>
    <rect class="tile" x="148" y="24" width="38" height="24"/>
    <rect class="tile" x="0" y="48" width="38" height="24"/>
    <rect class="tile" x="38" y="48" width="38" height="24"/>
    <rect class="tile" x="110" y="48" width="38" height="24"/>
    <rect class="tile" x="148" y="48" width="38" height="24"/>
    <rect class="tile" x="0" y="72" width="38" height="24"/>
    <rect class="tile" x="38" y="72" width="38" height="24"/>
    <rect class="tile" x="110" y="72" width="38" height="24"/>
    <rect class="tile" x="148" y="72" width="38" height="24"/>
    <rect class="tile" x="0" y="96" width="38" height="24"/>
    <rect class="tile" x="38" y="96" width="38" height="24"/>
    <rect class="tile" x="110" y="96" width="38" height="24"/>
    <rect class="tile" x="148" y="96" width="38" height="24"/>
    <rect class="tile" x="0" y="120" width="38" height="24"/>
    <rect class="tile" x="38" y="120" width="38" height="24"/>
    <rect class="tile" x="110" y="120" width="38" height="24"/>
    <rect class="tile" x="148" y="120" width="38" height="24"/>
    <rect class="tile" x="0" y="144" width="38" height="24"/>
    <rect class="tile" x="38" y="144" width="38" height="24"/>
    <rect class="tile" x="110" y="144" width="38" height="24"/>
    <rect class="tile" x="148" y="144" width="38" height="24"/>
    <rect class="tile" x="0" y="168" width="38" height="24"/>
    <rect class="tile" x="38" y="168" width="38" height="24"/>
    <rect class="tile" x="110" y="168" width="38" height="24"/>
    <rect class="tile" x="148" y="168" width="38" height="24"/>
    <rect class="tile" x="0" y="192" width="38" height="24"/>
    <rect class="tile" x="38" y="192" width="38" height="24"/>
    <rect class="tile" x="110" y="192" width="38" height="24"/>
    <rect class="tile" x="148" y="192" width="38" height="24"/>
  </g>

  <!-- C matrix -->
  <text x="622" y="196" class="label">C[M, N]</text>
  <text x="724" y="196" class="axis">N tiles</text>
  <text x="592" y="286" class="axis" transform="rotate(-90 592 286)">M tiles</text>
  <g transform="translate(622 212)">
    <rect class="c" x="0" y="0" width="58" height="48"/>
    <rect class="c" x="58" y="0" width="58" height="48"/>
    <rect class="csel" x="116" y="0" width="58" height="48"/>
    <rect class="c" x="174" y="0" width="58" height="48"/>
    <rect class="c" x="232" y="0" width="58" height="48"/>
    <rect class="c" x="0" y="48" width="58" height="48"/>
    <rect class="c" x="58" y="48" width="58" height="48"/>
    <rect class="c" x="116" y="48" width="58" height="48"/>
    <rect class="c" x="174" y="48" width="58" height="48"/>
    <rect class="c" x="232" y="48" width="58" height="48"/>
    <rect class="c" x="0" y="96" width="58" height="48"/>
    <rect class="c" x="58" y="96" width="58" height="48"/>
    <rect class="c" x="116" y="96" width="58" height="48"/>
    <rect class="c" x="174" y="96" width="58" height="48"/>
    <rect class="c" x="232" y="96" width="58" height="48"/>
    <text x="118" y="-10" class="tiny">selected output tile</text>
  </g>

  <path class="arrow" d="M 430 285 C 500 250, 540 236, 610 234"/>
  <path class="arrow" d="M 285 505 C 438 520, 552 372, 664 264"/>
  <text x="434" y="328" class="math">Ctile = sum_k Arow,k x Bk,col</text>

  <!-- Step 2 card: Stream-K partials -->
  <rect class="card" x="1000" y="118" width="450" height="430"/>
  <text x="1028" y="154" class="step">2. Stream K ranges into partial C tiles</text>
  <text x="1028" y="184" class="small">Each inter-CTA K stream owns a different K range.</text>

  <rect class="partial0" x="1036" y="226" width="120" height="66"/>
  <text x="1062" y="253" class="label">CTA 0</text>
  <text x="1061" y="275" class="tiny">K range 0</text>
  <rect class="partial1" x="1170" y="226" width="120" height="66"/>
  <text x="1196" y="253" class="label">CTA 1</text>
  <text x="1195" y="275" class="tiny">K range 1</text>
  <rect class="partial2" x="1304" y="226" width="120" height="66"/>
  <text x="1330" y="253" class="label">CTA 2</text>
  <text x="1329" y="275" class="tiny">K range 2</text>

  <path class="arrow" d="M 1096 292 L 1096 350"/>
  <path class="arrow" d="M 1230 292 L 1230 350"/>
  <path class="arrow" d="M 1364 292 L 1364 350"/>

  <rect class="partial0" x="1028" y="356" width="128" height="54"/>
  <text x="1058" y="389" class="tiny">partial C0</text>
  <rect class="partial1" x="1166" y="356" width="128" height="54"/>
  <text x="1196" y="389" class="tiny">partial C1</text>
  <rect class="partial2" x="1304" y="356" width="128" height="54"/>
  <text x="1334" y="389" class="tiny">partial C2</text>

  <path class="arrow" d="M 1092 410 C 1128 470, 1190 480, 1228 460"/>
  <path class="arrow" d="M 1368 410 C 1332 470, 1270 480, 1232 460"/>
  <rect class="atomic" x="1138" y="466" width="180" height="54"/>
  <text x="1178" y="499" class="label">atomic add</text>

  <!-- Step 3 card: inside CTA -->
  <rect class="card" x="40" y="592" width="670" height="320"/>
  <text x="68" y="628" class="step">3. Inside one CTA: slice the K range across warp groups</text>
  <rect class="partial1" x="74" y="676" width="560" height="46"/>
  <line x1="214" y1="676" x2="214" y2="722" stroke="#0891b2" stroke-width="2"/>
  <line x1="354" y1="676" x2="354" y2="722" stroke="#0891b2" stroke-width="2"/>
  <line x1="494" y1="676" x2="494" y2="722" stroke="#0891b2" stroke-width="2"/>
  <text x="112" y="704" class="tiny">slice 0</text>
  <text x="252" y="704" class="tiny">slice 1</text>
  <text x="392" y="704" class="tiny">slice 2</text>
  <text x="532" y="704" class="tiny">slice 3</text>
  <text x="260" y="666" class="small">one CTA K range</text>

  <rect class="warp" x="82" y="764" width="116" height="54"/>
  <rect class="warp" x="222" y="764" width="116" height="54"/>
  <rect class="warp" x="362" y="764" width="116" height="54"/>
  <rect class="warp" x="502" y="764" width="116" height="54"/>
  <text x="106" y="794" class="tiny">warp group 0</text>
  <text x="246" y="794" class="tiny">warp group 1</text>
  <text x="386" y="794" class="tiny">warp group 2</text>
  <text x="526" y="794" class="tiny">warp group 3</text>

  <path class="arrow" d="M 132 722 L 132 760"/>
  <path class="arrow" d="M 272 722 L 272 760"/>
  <path class="arrow" d="M 412 722 L 412 760"/>
  <path class="arrow" d="M 552 722 L 552 760"/>

  <rect class="lds" x="242" y="852" width="220" height="44"/>
  <text x="292" y="880" class="label">LDS local reduce</text>
  <path class="arrow" d="M 140 818 C 168 850, 210 858, 242 868"/>
  <path class="arrow" d="M 280 818 L 310 850"/>
  <path class="arrow" d="M 420 818 L 394 850"/>
  <path class="arrow" d="M 560 818 C 532 850, 494 858, 462 868"/>

  <!-- Step 4 card: multi-stage pipeline -->
  <rect class="card" x="748" y="592" width="702" height="320"/>
  <text x="776" y="628" class="step">4. Multi-stage pipeline keeps the K stream moving</text>
  <rect class="pipeline" x="792" y="684" width="132" height="58"/>
  <text x="820" y="708" class="label">stage s+2</text>
  <text x="812" y="729" class="tiny">async copy</text>
  <path class="arrow" d="M 924 714 L 996 714"/>
  <rect class="pipeline" x="1004" y="684" width="132" height="58"/>
  <text x="1032" y="708" class="label">stage s+1</text>
  <text x="1032" y="729" class="tiny">LDS ready</text>
  <path class="arrow" d="M 1136 714 L 1208 714"/>
  <rect class="pipeline" x="1216" y="684" width="132" height="58"/>
  <text x="1252" y="708" class="label">stage s</text>
  <text x="1243" y="729" class="tiny">MFMA compute</text>

  <rect class="note" x="826" y="792" width="470" height="72"/>
  <text x="858" y="822" class="label">Stream-K loop</text>
  <text x="858" y="848" class="small">current_stage is consumed, write_stage receives the next K block, then the ring advances.</text>
</svg>
