<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">FlyDSL shape-specialized kernel family</title>
  <desc id="desc">FlyDSL maps a parameterized Python kernel builder to specialized GPU kernels through MLIR and ROCDL lowering.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="12" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.1"/>
    </filter>
    <style>
      .bg { fill: #fffdf7; }
      .title { font: 700 30px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #111827; }
      .subtitle { font: 500 16px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #475569; }
      .label { font: 700 18px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #111827; }
      .small { font: 500 14px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #475569; }
      .tiny { font: 600 12px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #64748b; }
      .panel { fill: #fffaf0; stroke: #d8d3c4; stroke-width: 2; rx: 22; filter: url(#rough); }
      .python { fill: #eef2ff; stroke: #4f46e5; stroke-width: 3; rx: 14; filter: url(#rough); }
      .kernel { fill: #ecfeff; stroke: #0891b2; stroke-width: 3; rx: 14; filter: url(#rough); }
      .compiler { fill: #fff7ed; stroke: #f97316; stroke-width: 3; rx: 14; filter: url(#rough); }
      .output { fill: #f0fdf4; stroke: #16a34a; stroke-width: 3; rx: 14; filter: url(#rough); }
      .variant { fill: #fdf2f8; stroke: #db2777; stroke-width: 2; rx: 10; filter: url(#rough); }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); filter: url(#rough); }
    </style>
  </defs>

  <rect class="bg" width="1280" height="560"/>
  <text x="44" y="52" class="title">FlyDSL Turns the Idea into a Shape-Specialized Kernel Family</text>
  <text x="44" y="82" class="subtitle">The same algorithm is compiled into different variants for different decode GEMM shapes and GPU architectures.</text>

  <rect class="panel" x="42" y="122" width="1196" height="350"/>

  <rect class="python" x="82" y="188" width="208" height="120"/>
  <text x="124" y="225" class="label">Python builder</text>
  <text x="112" y="253" class="small">compile_hgemm_kernel</text>
  <text x="112" y="278" class="tiny">tile / split / slice / bias</text>

  <path class="arrow" d="M 290 248 L 366 248"/>

  <rect class="kernel" x="374" y="188" width="190" height="120"/>
  <text x="420" y="225" class="label">@flyc.kernel</text>
  <text x="414" y="253" class="small">GPU kernel body</text>
  <text x="414" y="278" class="tiny">gpu / vector / rocdl</text>

  <path class="arrow" d="M 564 248 L 640 248"/>

  <rect class="compiler" x="648" y="188" width="190" height="120"/>
  <text x="700" y="225" class="label">MLIR stack</text>
  <text x="684" y="253" class="small">Fly -> ROCDL</text>
  <text x="692" y="278" class="tiny">MFMA / atomics / LDS</text>

  <path class="arrow" d="M 838 248 L 914 248"/>

  <rect class="output" x="922" y="188" width="230" height="120"/>
  <text x="974" y="225" class="label">@flyc.jit</text>
  <text x="958" y="253" class="small">cached GPU binary</text>
  <text x="960" y="278" class="tiny">shape-specialized launch</text>

  <path class="arrow" d="M 1038 308 L 1038 356"/>

  <rect class="variant" x="770" y="362" width="132" height="54"/>
  <rect class="variant" x="920" y="362" width="132" height="54"/>
  <rect class="variant" x="1070" y="362" width="132" height="54"/>
  <text x="795" y="385" class="tiny">M=1, K large</text>
  <text x="794" y="403" class="tiny">SPLIT_K=...</text>
  <text x="945" y="385" class="tiny">M=8, K large</text>
  <text x="944" y="403" class="tiny">Slice-K=...</text>
  <text x="1095" y="385" class="tiny">bias / arch path</text>
  <text x="1095" y="403" class="tiny">MFMA variant</text>

  <text x="92" y="508" class="small">FlyDSL keeps the algorithm readable while still exposing low-level GPU operations needed by the optimized kernel.</text>
</svg>
