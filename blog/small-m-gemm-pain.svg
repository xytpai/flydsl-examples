<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Small-M large-K tiled GEMM pain point</title>
  <desc id="desc">A tiled GEMM diagram showing that small M creates too few C tiles while large K still contains a long stream of work that can be parallelized.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#263238"/>
    </marker>
    <style>
      .bg { fill: #fffaf0;}
      .card { fill: #fffdf7; stroke: #ded6c3; stroke-width: 1.5; rx: 22;}
      .title { font: 800 34px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #172033;}
      .subtitle { font: 500 17px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #5b6472;}
      .section { font: 800 20px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #172033;}
      .label { font: 700 15px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #172033;}
      .small { font: 500 13px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #4b5563;}
      .tiny { font: 600 11px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #64748b;}
      .axis { font: 700 12px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #64748b;}
      .tile { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1;}
      .a { fill: #e8edff; stroke: #4f46e5; stroke-width: 1.8;}
      .b { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.8;}
      .c { fill: #fff7ed; stroke: #f97316; stroke-width: 1.4;}
      .c-hot { fill: #ffe4f1; stroke: #db2777; stroke-width: 2.8;}
      .cu-on { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8;}
      .cu-off { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; rx: 8;}
      .stream { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 10;}
      .warn { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; rx: 14;}
      .arrow { stroke: #263238; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round}
      .dash { stroke-dasharray: 7 6;}
      .sketch {}
    </style>
  </defs>

  <rect class="bg" width="1400" height="760"/>
  <text x="42" y="54" class="title">Why small-M decode GEMM runs out of visible parallel work</text>
  <text x="44" y="84" class="subtitle">The output grid is thin, but every C tile still hides a long K-reduction stream.</text>

  <rect class="card" x="40" y="120" width="610" height="560"/>
  <text x="70" y="158" class="section">1. The GEMM shape is skinny in M</text>
  <text x="70" y="188" class="small">C has only a few tile rows, even when N and K are large.</text>

  <text x="82" y="238" class="label">A[M, K]</text>
  <text x="230" y="238" class="axis">long K</text>
  <text x="54" y="312" class="axis" transform="rotate(-90 54 312)">small M</text>
  <g transform="translate(82 258)">
    <rect class="a" x="0" y="0" width="34" height="32"/>
    <rect class="a" x="34" y="0" width="34" height="32"/>
    <rect class="a" x="68" y="0" width="34" height="32"/>
    <rect class="a" x="102" y="0" width="34" height="32"/>
    <rect class="a" x="136" y="0" width="34" height="32"/>
    <rect class="a" x="170" y="0" width="34" height="32"/>
    <rect class="a" x="204" y="0" width="34" height="32"/>
    <rect class="a" x="238" y="0" width="34" height="32"/>
    <rect class="a" x="272" y="0" width="34" height="32"/>
    <rect class="a" x="306" y="0" width="34" height="32"/>
    <rect class="a" x="340" y="0" width="34" height="32"/>
    <rect class="a" x="374" y="0" width="34" height="32"/>
    <rect class="tile" x="0" y="32" width="34" height="32"/>
    <rect class="tile" x="34" y="32" width="34" height="32"/>
    <rect class="tile" x="68" y="32" width="34" height="32"/>
    <rect class="tile" x="102" y="32" width="34" height="32"/>
    <rect class="tile" x="136" y="32" width="34" height="32"/>
    <rect class="tile" x="170" y="32" width="34" height="32"/>
    <rect class="tile" x="204" y="32" width="34" height="32"/>
    <rect class="tile" x="238" y="32" width="34" height="32"/>
    <rect class="tile" x="272" y="32" width="34" height="32"/>
    <rect class="tile" x="306" y="32" width="34" height="32"/>
    <rect class="tile" x="340" y="32" width="34" height="32"/>
    <rect class="tile" x="374" y="32" width="34" height="32"/>
  </g>

  <text x="82" y="398" class="label">B^T[K, N]</text>
  <text x="230" y="398" class="axis">wide N</text>
  <text x="54" y="480" class="axis" transform="rotate(-90 54 480)">long K</text>
  <g transform="translate(82 418)">
    <rect class="b" x="0" y="0" width="36" height="24"/>
    <rect class="b" x="36" y="0" width="36" height="24"/>
    <rect class="b" x="72" y="0" width="36" height="24"/>
    <rect class="b" x="108" y="0" width="36" height="24"/>
    <rect class="b" x="144" y="0" width="36" height="24"/>
    <rect class="b" x="180" y="0" width="36" height="24"/>
    <rect class="b" x="216" y="0" width="36" height="24"/>
    <rect class="b" x="252" y="0" width="36" height="24"/>
    <rect class="b" x="288" y="0" width="36" height="24"/>
    <rect class="b" x="324" y="0" width="36" height="24"/>
    <rect class="b" x="360" y="0" width="36" height="24"/>
    <rect class="b" x="396" y="0" width="36" height="24"/>
    <rect class="tile" x="0" y="24" width="36" height="24"/>
    <rect class="tile" x="36" y="24" width="36" height="24"/>
    <rect class="tile" x="72" y="24" width="36" height="24"/>
    <rect class="tile" x="108" y="24" width="36" height="24"/>
    <rect class="tile" x="144" y="24" width="36" height="24"/>
    <rect class="tile" x="180" y="24" width="36" height="24"/>
    <rect class="tile" x="216" y="24" width="36" height="24"/>
    <rect class="tile" x="252" y="24" width="36" height="24"/>
    <rect class="tile" x="288" y="24" width="36" height="24"/>
    <rect class="tile" x="324" y="24" width="36" height="24"/>
    <rect class="tile" x="360" y="24" width="36" height="24"/>
    <rect class="tile" x="396" y="24" width="36" height="24"/>
    <rect class="tile" x="0" y="48" width="36" height="24"/>
    <rect class="tile" x="36" y="48" width="36" height="24"/>
    <rect class="tile" x="72" y="48" width="36" height="24"/>
    <rect class="tile" x="108" y="48" width="36" height="24"/>
    <rect class="tile" x="144" y="48" width="36" height="24"/>
    <rect class="tile" x="180" y="48" width="36" height="24"/>
    <rect class="tile" x="216" y="48" width="36" height="24"/>
    <rect class="tile" x="252" y="48" width="36" height="24"/>
    <rect class="tile" x="288" y="48" width="36" height="24"/>
    <rect class="tile" x="324" y="48" width="36" height="24"/>
    <rect class="tile" x="360" y="48" width="36" height="24"/>
    <rect class="tile" x="396" y="48" width="36" height="24"/>
    <rect class="tile" x="0" y="72" width="36" height="24"/>
    <rect class="tile" x="36" y="72" width="36" height="24"/>
    <rect class="tile" x="72" y="72" width="36" height="24"/>
    <rect class="tile" x="108" y="72" width="36" height="24"/>
    <rect class="tile" x="144" y="72" width="36" height="24"/>
    <rect class="tile" x="180" y="72" width="36" height="24"/>
    <rect class="tile" x="216" y="72" width="36" height="24"/>
    <rect class="tile" x="252" y="72" width="36" height="24"/>
    <rect class="tile" x="288" y="72" width="36" height="24"/>
    <rect class="tile" x="324" y="72" width="36" height="24"/>
    <rect class="tile" x="360" y="72" width="36" height="24"/>
    <rect class="tile" x="396" y="72" width="36" height="24"/>
  </g>

  <path class="arrow" d="M 520 302 C 575 318, 615 345, 690 362"/>
  <path class="arrow" d="M 540 464 C 594 448, 626 410, 690 384"/>

  <rect class="card" x="690" y="120" width="330" height="560"/>
  <text x="720" y="158" class="section">2. Output tile grid is thin</text>
  <text x="720" y="188" class="small">A conventional GEMM launches CTAs mainly over M x N tiles.</text>
  <text x="740" y="248" class="label">C[M, N]</text>
  <text x="840" y="248" class="axis">many N tiles</text>
  <text x="712" y="326" class="axis" transform="rotate(-90 712 326)">few M tiles</text>
  <g transform="translate(740 274)">
    <rect class="c-hot" x="0" y="0" width="48" height="42"/>
    <rect class="c-hot" x="48" y="0" width="48" height="42"/>
    <rect class="c-hot" x="96" y="0" width="48" height="42"/>
    <rect class="c-hot" x="144" y="0" width="48" height="42"/>
    <rect class="c-hot" x="192" y="0" width="48" height="42"/>
    <rect class="c" x="0" y="42" width="48" height="42"/>
    <rect class="c" x="48" y="42" width="48" height="42"/>
    <rect class="c" x="96" y="42" width="48" height="42"/>
    <rect class="c" x="144" y="42" width="48" height="42"/>
    <rect class="c" x="192" y="42" width="48" height="42"/>
  </g>

  <rect class="warn" x="740" y="430" width="230" height="74"/>
  <text x="766" y="460" class="label">Problem</text>
  <text x="766" y="484" class="small">Few C tiles means few CTAs, even though K is long.</text>

  <g transform="translate(734 552)">
    <rect class="cu-on" x="0" y="0" width="46" height="34"/>
    <rect class="cu-on" x="54" y="0" width="46" height="34"/>
    <rect class="cu-on" x="108" y="0" width="46" height="34"/>
    <rect class="cu-on" x="162" y="0" width="46" height="34"/>
    <rect class="cu-off" x="0" y="44" width="46" height="34"/>
    <rect class="cu-off" x="54" y="44" width="46" height="34"/>
    <rect class="cu-off" x="108" y="44" width="46" height="34"/>
    <rect class="cu-off" x="162" y="44" width="46" height="34"/>
    <text x="0" y="104" class="tiny">many CUs may wait</text>
  </g>

  <rect class="card" x="1060" y="120" width="300" height="560"/>
  <text x="1090" y="158" class="section">3. Stream-K exposes hidden work</text>
  <text x="1090" y="188" class="small">Split the long K reduction into several stream ranges.</text>
  <rect class="stream" x="1100" y="254" width="220" height="46"/>
  <line x1="1155" y1="254" x2="1155" y2="300" stroke="#7c3aed" stroke-width="2"/>
  <line x1="1210" y1="254" x2="1210" y2="300" stroke="#7c3aed" stroke-width="2"/>
  <line x1="1265" y1="254" x2="1265" y2="300" stroke="#7c3aed" stroke-width="2"/>
  <text x="1116" y="282" class="tiny">K0</text>
  <text x="1171" y="282" class="tiny">K1</text>
  <text x="1226" y="282" class="tiny">K2</text>
  <text x="1281" y="282" class="tiny">K3</text>

  <path class="arrow" d="M 1128 302 L 1128 364"/>
  <path class="arrow" d="M 1182 302 L 1182 364"/>
  <path class="arrow" d="M 1238 302 L 1238 364"/>
  <path class="arrow" d="M 1292 302 L 1292 364"/>

  <rect class="cu-on" x="1096" y="372" width="58" height="42"/>
  <rect class="cu-on" x="1168" y="372" width="58" height="42"/>
  <rect class="cu-on" x="1240" y="372" width="58" height="42"/>
  <rect class="cu-on" x="1096" y="428" width="58" height="42"/>
  <rect class="cu-on" x="1168" y="428" width="58" height="42"/>
  <rect class="cu-on" x="1240" y="428" width="58" height="42"/>
  <text x="1106" y="398" class="tiny">CTA</text>
  <text x="1178" y="398" class="tiny">CTA</text>
  <text x="1250" y="398" class="tiny">CTA</text>
  <text x="1106" y="454" class="tiny">CTA</text>
  <text x="1178" y="454" class="tiny">CTA</text>
  <text x="1250" y="454" class="tiny">CTA</text>

  <rect class="warn" x="1096" y="536" width="220" height="74"/>
  <text x="1120" y="566" class="label">Goal</text>
  <text x="1120" y="590" class="small">Make K-parallel work visible without changing the GEMM result.</text>
</svg>
