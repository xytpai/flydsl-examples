class="ok" x="1012" y="510" width="245" height="62" data-sketch="1"/><rect x="1012.0" y="510.0" width="245" height="62" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="1042" y="546" class="label">more parallel work, same math</text></svg>
