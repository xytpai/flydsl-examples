<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600" role="img" aria-labelledby="title desc">
  <title id="title">Small-M large-K GEMM pain point</title>
  <desc id="desc">A small-M GEMM has only a few output tiles along M, leaving many compute units underutilized even though K is large.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M 26 0 L 0 0 0 26" fill="none" stroke="#d6d3d1" stroke-width="1"/>
    </pattern>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.1"/>
    </filter>
    <style>
      .bg { fill: #fffdf7; }
      .title { font: 700 30px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #111827; }
      .subtitle { font: 500 16px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #475569; }
      .label { font: 700 18px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #111827; }
      .small { font: 500 14px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #475569; }
      .tiny { font: 600 12px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive; fill: #64748b; }
      .panel { fill: #fffaf0; stroke: #d8d3c4; stroke-width: 2; rx: 22; filter: url(#rough); }
      .c { fill: #fdf2f8; stroke: #db2777; stroke-width: 3; filter: url(#rough); }
      .tile { fill: #fff7ed; stroke: #f97316; stroke-width: 3; filter: url(#rough); }
      .a { fill: #eef2ff; stroke: #4f46e5; stroke-width: 3; filter: url(#rough); }
      .b { fill: #ecfeff; stroke: #0891b2; stroke-width: 3; filter: url(#rough); }
      .cu-active { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; filter: url(#rough); }
      .cu-idle { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; rx: 8; filter: url(#rough); }
      .warn { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 14; filter: url(#rough); }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); filter: url(#rough); }
    </style>
  </defs>

  <rect class="bg" width="1280" height="600"/>
  <text x="44" y="52" class="title">The Pain Point: Small M Gives Too Few C Tiles</text>
  <text x="44" y="82" class="subtitle">Decode GEMM can have plenty of K work, but not enough independent output tiles to occupy the GPU.</text>

  <rect class="panel" x="44" y="122" width="560" height="410"/>
  <text x="76" y="164" class="label">Output matrix C: small M, large N</text>
  <rect x="96" y="212" width="430" height="104" fill="url(#grid)" stroke="#94a3b8" stroke-width="2"/>
  <rect class="tile" x="96" y="212" width="104" height="52"/>
  <rect class="tile" x="200" y="212" width="104" height="52" opacity="0.8"/>
  <rect class="tile" x="304" y="212" width="104" height="52" opacity="0.65"/>
  <rect class="tile" x="408" y="212" width="104" height="52" opacity="0.5"/>
  <text x="268" y="342" class="label">few CTA tiles</text>
  <text x="80" y="270" class="tiny" transform="rotate(-90 80 270)">small M</text>
  <text x="274" y="202" class="tiny">large N</text>

  <rect class="a" x="108" y="404" width="278" height="34"/>
  <rect class="b" x="432" y="370" width="34" height="120"/>
  <text x="174" y="427" class="small">A row/block over long K</text>
  <text x="480" y="444" class="small" transform="rotate(90 480 444)">B column/block over long K</text>
  <text x="120" y="470" class="small">K is large, but the output grid is still small.</text>

  <path class="arrow" d="M 604 326 L 676 326"/>

  <rect class="panel" x="684" y="122" width="552" height="410"/>
  <text x="716" y="164" class="label">GPU occupancy problem</text>
  <text x="716" y="190" class="small">Only a few CTAs are available, so many CUs wait.</text>

  <g transform="translate(728 228)">
    <rect class="cu-active" x="0" y="0" width="70" height="46"/>
    <rect class="cu-active" x="84" y="0" width="70" height="46"/>
    <rect class="cu-active" x="168" y="0" width="70" height="46"/>
    <rect class="cu-active" x="252" y="0" width="70" height="46"/>
    <rect class="cu-idle" x="336" y="0" width="70" height="46"/>
    <rect class="cu-idle" x="420" y="0" width="70" height="46"/>
    <rect class="cu-idle" x="0" y="62" width="70" height="46"/>
    <rect class="cu-idle" x="84" y="62" width="70" height="46"/>
    <rect class="cu-idle" x="168" y="62" width="70" height="46"/>
    <rect class="cu-idle" x="252" y="62" width="70" height="46"/>
    <rect class="cu-idle" x="336" y="62" width="70" height="46"/>
    <rect class="cu-idle" x="420" y="62" width="70" height="46"/>
    <text x="20" y="29" class="tiny">CTA</text>
    <text x="104" y="29" class="tiny">CTA</text>
    <text x="188" y="29" class="tiny">CTA</text>
    <text x="272" y="29" class="tiny">CTA</text>
    <text x="356" y="29" class="tiny">idle</text>
    <text x="440" y="29" class="tiny">idle</text>
    <text x="20" y="91" class="tiny">idle</text>
    <text x="104" y="91" class="tiny">idle</text>
    <text x="188" y="91" class="tiny">idle</text>
    <text x="272" y="91" class="tiny">idle</text>
    <text x="356" y="91" class="tiny">idle</text>
    <text x="440" y="91" class="tiny">idle</text>
  </g>

  <rect class="warn" x="740" y="398" width="438" height="72"/>
  <text x="776" y="428" class="label">Problem</text>
  <text x="776" y="454" class="small">Small M limits global parallelism even when K is long.</text>
</svg>
