<rect class="c" x="308" y="320" width="34" height="42"/>
<rect class="c" x="342" y="320" width="34" height="42"/><rect class="bad" x="104" y="430" width="270" height="78" data-sketch="1"/><rect x="104.7" y="430.6" width="270" height="78" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="130" y="462" class="label">Problem</text><text x="130" y="486" class="small">few C tiles -> few CTAs</text>
<rect class="panel" x="500" y="130" width="395" height="500" data-sketch="1"/><rect x="499.3" y="129.4" width="395" height="500" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="532" y="170" class="section">2. But K is long</text><text x="532" y="196" class="small">Each C tile sums many K blocks.</text>
<text x="548" y="252" class="label">A row tile over K</text><rect class="k0" x="548" y="278" width="30" height="48"/><rect class="k0" x="578" y="278" width="30" height="48"/><rect class="k1" x="608" y="278" width="30" height="48"/><rect class="k1" x="638" y="278" width="30" height="48"/><rect class="k2" x="668" y="278" width="30" height="48"/><rect class="k2" x="698" y="278" width="30" height="48"/><rect class="k3" x="728" y="278" width="30" height="48"/><rect class="k3" x="758" y="278" width="30" height="48"/><rect class="grid" x="788" y="278" width="30" height="48"/><rect class="grid" x="818" y="278" width="30" height="48"/><text x="548" y="352" class="label">B column tile over K</text><rect class="k0" x="650" y="380" width="52" height="24"/><rect class="k0" x="650" y="404" width="52" height="24"/><rect class="k1" x="650" y="428" width="52" height="24"/><rect class="k1" x="650" y="452" width="52" height="24"/><rect class="k2" x="650" y="476" width="52" height="24"/><rect class="k2" x="650" y="500" width="52" height="24"/><rect class="k3" x="650" y="524" width="52" height="24"/><rect class="k3" x="650" y="548" width="52" height="24"/><path class="arrow" d="M702 456 C760 464 796 506 810 560" data-sketch="1"/><path d="M702 456 C760 464 796 506 810 560" stroke="#3f3f46" stroke-width="1.1" opacity="0.45" fill="none"/><rect class="hot" x="790" y="540" width="72" height="54" data-sketch="1"/><rect x="789.3" y="539.4" width="72" height="54" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="798" y="572" class="tiny">C tile</text>
<rect class="panel" x="950" y="130" width="395" height="500" data-sketch="1"/><rect x="949.3" y="129.4" width="395" height="500" rx="10" fill="none" stroke="#c9bfae" stroke-width="1" opacity="0.45"/><text x="982" y="170" class="section">3. Stream K exposes work</text><text x="982" y="196" class="small">Split K blocks into parallel ranges.</text>
