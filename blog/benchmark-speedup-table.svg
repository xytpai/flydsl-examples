<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
<title id="title">Mixed Stream-K hand-drawn benchmark summary table</title>
<desc id="desc">A hand-drawn visual table of Mixed Stream-K speedups versus the faster generic backend across M and N.</desc>
<defs>
