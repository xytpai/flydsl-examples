  <style>
    .bg{fill:#fffaf0}.card{fill:#fffdf7;stroke:#cfc5ae;stroke-width:2.2;rx:24;}
    .sketch{}.title{font:700 34px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive;fill:#22222a}.subtitle{font:500 17px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive;fill:#5f5a50}
    .label{font:700 16px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive;fill:#26262b}.axis{font:700 13px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive;fill:#665f55}
    .tiny{font:600 11px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive;fill:#665f55}.num{font:800 21px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive}.subnum{font:600 11px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive}
    .line{fill:none;stroke-width:3.4;stroke-linejoin:round;stroke-linecap:round;}.dot{stroke:#fffdf7;stroke-width:2;}.tick{stroke:#dfd6c8;stroke-width:1;stroke-dasharray:5 6}.note{font:500 12px "Comic Sans MS", "Comic Neue", "Chalkboard SE", cursive;fill:#7c4a03;}
  </style>
</defs>
