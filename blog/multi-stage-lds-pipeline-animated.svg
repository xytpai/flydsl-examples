<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820" role="img" aria-labelledby="title desc">
<title id="title">Animated multi-stage LDS pipeline</title>
<desc id="desc">A rolling K-block pipeline where global copy, LDS readiness, MFMA compute, and C accumulation overlap over time.</desc>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 C3,1 6,3 9,4 C6,5 3,7 0,8 Z" fill="#3f3f46"/>
  </marker>
  <style>
    .bg{fill:#fffaf0}.panel{fill:#fffdf7;stroke:#c9bfae;stroke-width:2;rx:20}
    .title{font:800 32px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#1f2937}
    .subtitle{font:500 16px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#5f5a50}
    .section{font:800 18px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#1f2937}
    .label{font:700 14px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#1f2937}
    .small{font:500 13px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#5f5a50}
    .tiny{font:600 11px "Comic Sans MS","Comic Neue","Chalkboard SE",cursive;fill:#665f55}
    .grid{fill:#ffffff;stroke:#cbd5e1;stroke-width:1}.k0{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.k1{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.k2{fill:#fef3c7;stroke:#f59e0b;stroke-width:2}.k3{fill:#fce7f3;stroke:#db2777;stroke-width:2}
    .stage{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.lds{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2;rx:12}.mfma{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:12}.ok{fill:#ecfdf5;stroke:#10b981;stroke-width:2;rx:12}
    .arrow{stroke:#3f3f46;stroke-width:2.4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}.ghost{fill:none;stroke:#c9bfae;stroke-width:1;opacity:.45}
    .lane{stroke:#e8dccd;stroke-width:2;stroke-dasharray:6 8}.flow{stroke:#7c3aed;stroke-width:4;fill:none;stroke-linecap:round;stroke-dasharray:14 10;animation:dash 1.2s linear infinite}
    .clock{fill:#fffdf7;stroke:#c9bfae;stroke-width:1.6;rx:14}
    .active0{animation:a0 9s infinite}.active1{animation:a1 9s infinite}.active2{animation:a2 9s infinite}
    .pulse0{animation:p0 9s infinite}.pulse1{animation:p1 9s infinite}.pulse2{animation:p2 9s infinite}
    .token{stroke:#1f2937;stroke-width:1.3;rx:8}
    @keyframes dash{to{stroke-dashoffset:-24}}
    @keyframes a0{0%,27%{opacity:1}33%,100%{opacity:.25}}
    @keyframes a1{0%,27%{opacity:.25}34%,61%{opacity:1}67%,100%{opacity:.25}}
    @keyframes a2{0%,61%{opacity:.25}68%,96%{opacity:1}100%{opacity:.35}}
    @keyframes p0{0%,27%{stroke:#7c3aed;stroke-width:5;opacity:1}33%,100%{stroke:#c9bfae;stroke-width:1.4;opacity:.5}}
    @keyframes p1{0%,27%{stroke:#c9bfae;stroke-width:1.4;opacity:.5}34%,61%{stroke:#7c3aed;stroke-width:5;opacity:1}67%,100%{stroke:#c9bfae;stroke-width:1.4;opacity:.5}}
    @keyframes p2{0%,61%{stroke:#c9bfae;stroke-width:1.4;opacity:.5}68%,96%{stroke:#7c3aed;stroke-width:5;opacity:1}100%{stroke:#c9bfae;stroke-width:1.4;opacity:.6}}
  </style>
</defs>

<rect class="bg" width="1500" height="820"/>
<text x="42" y="54" class="title">Multi-Stage LDS Pipeline</text>
<text x="44" y="84" class="subtitle">Animated view: while one K block feeds MFMA, the next is ready in LDS and a later block is copied from global memory.</text>

<rect class="panel" x="50" y="125" width="560" height="300"/>
<rect class="ghost" x="49.3" y="124.4" width="560" height="300" rx="20"/>
<text x="82" y="166" class="section">1. Same tiled GEMM math</text>
<text x="92" y="216" class="label">A row over K</text>
<rect class="k0 active0" x="92" y="238" width="80" height="38"/><rect class="k1 active1" x="172" y="238" width="80" height="38"/><rect class="k2 active2" x="252" y="238" width="80" height="38"/><rect class="grid" x="332" y="238" width="80" height="38"/>
<text x="118" y="263" class="tiny">K i</text><text x="190" y="263" class="tiny">K i+1</text><text x="272" y="263" class="tiny">K i+2</text>
<text x="92" y="322" class="label">B column over K</text>
<rect class="k0 active0" x="258" y="312" width="52" height="32"/><rect class="k1 active1" x="258" y="344" width="52" height="32"/><rect class="k2 active2" x="258" y="376" width="52" height="32"/>
<path class="arrow" d="M420 258 C474 270 516 296 548 332"/>
<path class="arrow" d="M310 362 C392 362 468 356 542 356"/>
<rect class="ok" x="530" y="333" width="58" height="46"/>
<text x="540" y="361" class="tiny">C tile</text>

<rect class="panel" x="660" y="125" width="790" height="300"/>
<rect class="ghost" x="659.3" y="124.4" width="790" height="300" rx="20"/>
<text x="692" y="166" class="section">2. Three K blocks in flight at time t</text>
<text x="700" y="218" class="small">The current loop iteration overlaps memory movement and compute.</text>
<rect class="stage pulse2" x="720" y="252" width="140" height="78"/><text x="758" y="282" class="label">K i+2</text><text x="752" y="307" class="tiny">global copy</text>
<path class="arrow" d="M860 290 L894 290"/>
<rect class="lds pulse1" x="900" y="252" width="140" height="78"/><text x="938" y="282" class="label">K i+1</text><text x="930" y="307" class="tiny">ready in LDS</text>
<path class="arrow" d="M1040 290 L1074 290"/>
<rect class="mfma pulse0" x="1080" y="252" width="140" height="78"/><text x="1118" y="282" class="label">K i</text><text x="1110" y="307" class="tiny">MFMA compute</text>
<path class="arrow" d="M1220 290 L1254 290"/>
<rect class="ok pulse0" x="1260" y="252" width="140" height="78"/><text x="1298" y="282" class="label">C frag</text><text x="1290" y="307" class="tiny">accumulate</text>
<path class="flow" d="M790 350 C900 396 1190 396 1300 350"/>

<rect class="panel" x="50" y="485" width="1400" height="240"/>
<rect class="ghost" x="49.3" y="484.4" width="1400" height="240" rx="20"/>
<text x="82" y="526" class="section">3. Ring buffer advances over time</text>
<line class="lane" x1="205" y1="594" x2="1320" y2="594"/>
<line class="lane" x1="205" y1="672" x2="1320" y2="672"/>
<text x="92" y="600" class="label">time t</text>
<text x="92" y="678" class="label">time t+1</text>

<rect class="clock active0" x="220" y="560" width="190" height="54"/><text x="252" y="594" class="label">compute K i</text>
<path class="arrow active0" d="M410 587 L470 587"/>
<rect class="clock active0" x="480" y="560" width="190" height="54"/><text x="512" y="594" class="label">ready K i+1</text>
<path class="arrow active0" d="M670 587 L730 587"/>
<rect class="clock active0" x="740" y="560" width="190" height="54"/><text x="772" y="594" class="label">copy K i+2</text>
<path class="arrow active0" d="M930 587 L990 587"/>
<rect class="clock active0" x="1000" y="560" width="190" height="54"/><text x="1032" y="594" class="label">C += partial i</text>

<rect class="clock active1" x="220" y="638" width="190" height="54"/><text x="252" y="672" class="label">compute K i+1</text>
<path class="arrow active1" d="M410 665 L470 665"/>
<rect class="clock active1" x="480" y="638" width="190" height="54"/><text x="512" y="672" class="label">ready K i+2</text>
<path class="arrow active1" d="M670 665 L730 665"/>
<rect class="clock active1" x="740" y="638" width="190" height="54"/><text x="772" y="672" class="label">copy K i+3</text>
<path class="arrow active1" d="M930 665 L990 665"/>
<rect class="clock active1" x="1000" y="638" width="190" height="54"/><text x="1032" y="672" class="label">C += partial i+1</text>

<rect class="token k0" x="248" y="566" width="24" height="24">
  <animate attributeName="x" values="248;506;766;1028;248" keyTimes="0;.28;.56;.84;1" dur="9s" repeatCount="indefinite"/>
  <animate attributeName="y" values="566;566;566;566;566" keyTimes="0;.28;.56;.84;1" dur="9s" repeatCount="indefinite"/>
</rect>
<rect class="token k1" x="506" y="644" width="24" height="24">
  <animate attributeName="x" values="506;766;1028;248;506" keyTimes="0;.28;.56;.84;1" dur="9s" repeatCount="indefinite"/>
  <animate attributeName="y" values="644;644;644;644;644" keyTimes="0;.28;.56;.84;1" dur="9s" repeatCount="indefinite"/>
</rect>
<rect class="token k2" x="766" y="566" width="24" height="24">
  <animate attributeName="x" values="766;1028;248;506;766" keyTimes="0;.28;.56;.84;1" dur="9s" repeatCount="indefinite"/>
  <animate attributeName="y" values="566;566;566;566;566" keyTimes="0;.28;.56;.84;1" dur="9s" repeatCount="indefinite"/>
</rect>
</svg>
